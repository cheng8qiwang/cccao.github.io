      <h1 data-i18n="journalEntryTitleOne" data-zh="一个关于被人追杀的梦" data-en="An ordinary evening worth writing down">一个普通但让我想记下来的傍晚</h1>
      <p
        data-i18n="journalEntryBodyOneB"
        data-zh="梦的大概内容是这样的：我好像去参加了一个什么会议，有一些熟人但是也认识了一些新朋友。在我们返程的路上，我们被一个群开车的人追杀，于是我们立刻逃进了附近的一所小学里面，并跑到楼上。这个小学的楼宇结构虽然比较复杂，但是那群杀手找我们的速度很快。正当我们手足无措的时候，我们遇到了这个小学的校长。"
        data-en="I spent most of the day working through simulation results. Some parts moved smoothly, while other questions still remain unresolved. I used to feel anxious whenever I did not get an answer quickly, but I am gradually learning that research is naturally a process of trial, error, and moving closer to the truth."
      >
      </p>
      <p
        data-i18n="journalEntryBodyOneC"
        data-zh="校长是一个长得比我矮一点点的女士，穿着深红色的西服正装。她简单了解我们情况以后，用手机帮我们报警，同时引领我们逃跑。"
        data-en="After getting home, I cooked a simple dinner for myself and sat down afterward to organize these thoughts. I think that writing down these seemingly ordinary days may become far more meaningful than I can imagine when I look back years later."
      >
      </p>
      <p
        data-i18n="journalEntryBodyOneC"
        data-zh="解梦：我白天看了一部电影叫《保持通话》，里面也有相似情节；还有就是这一天我正好再赶一篇论文的交稿，睡觉的时候还没写完，想着早起继续写，可能是这种精神压力在梦里映射成了一群杀手在追我。"
        data-en="After getting home, I cooked a simple dinner for myself and sat down afterward to organize these thoughts. I think that writing down these seemingly ordinary days may become far more meaningful than I can imagine when I look back years later."
      >
      </p>
      <p
        data-i18n="journalEntryBodyOneC"
        data-zh="后记：醒来之后，我赶紧继续写完了论文并发给了我的导师，当天的meeting也还算顺利。我想这个梦是要提醒我好好休息，不要再做拖延症晚期患者了吧。"
